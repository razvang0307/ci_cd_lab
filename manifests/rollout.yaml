apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/razvang0307/ci_cd_lab@sha256:90487b5dd7e8c34c2aec9a20cc46993437d6cd3b0678d79f165c20a9ed30259c
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
